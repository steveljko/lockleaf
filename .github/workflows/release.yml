name: Release

# Cut a release when you push a version tag, e.g.:
#   git tag v1.2.3 && git push origin v1.2.3
# This builds the signed .app, stamps it with the tag's version, zips it, and
# publishes a GitHub Release with the archive attached.
#
# You can also trigger it manually from the Actions tab (workflow_dispatch),
# providing the version explicitly.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.2.3)"
        required: true

permissions:
  contents: write # needed to create the GitHub Release

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & Publish
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve version
        id: ver
        run: |
          REF="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${REF#v}"                       # strip leading "v"
          echo "tag=$REF"           >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"   >> "$GITHUB_OUTPUT"
          echo "Releasing $REF (version $VERSION, build ${GITHUB_RUN_NUMBER})"

      - name: Stamp version into Info.plist
        run: |
          PLIST="Resources/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.ver.outputs.version }}" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${GITHUB_RUN_NUMBER}" "$PLIST"

      - name: Run tests
        run: swift test

      - name: Build .app bundle
        run: ./Scripts/build_app.sh release

      - name: Build .dmg installer
        id: dmg
        run: |
          ./Scripts/make_dmg.sh "${{ steps.ver.outputs.version }}"
          echo "path=build/Lockleaf-${{ steps.ver.outputs.version }}.dmg" >> "$GITHUB_OUTPUT"

      - name: Archive .app (zip, preserving signature)
        id: zip
        run: |
          NAME="Lockleaf-${{ steps.ver.outputs.version }}.zip"
          ditto -c -k --sequesterRsrc --keepParent "build/Lockleaf.app" "build/${NAME}"
          echo "path=build/${NAME}" >> "$GITHUB_OUTPUT"
          shasum -a 256 "build/${NAME}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Lockleaf ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            ${{ steps.dmg.outputs.path }}
            ${{ steps.zip.outputs.path }}
          body: |
            ### Lockleaf ${{ steps.ver.outputs.version }}

            Native macOS TOTP vault. Requires macOS 15 or later.

            **Install:** open `Lockleaf-${{ steps.ver.outputs.version }}.dmg` and drag
            **Lockleaf** into **Applications**. (The `.zip` contains the bare `.app`
            if you prefer.)

            > This build is **ad-hoc code-signed, not notarized**. On first launch
            > macOS Gatekeeper will warn; right-click the app → **Open**, or run
            > `xattr -dr com.apple.quarantine /Applications/Lockleaf.app`.
            > To ship a notarized build, see the signing notes in `README.md`.
