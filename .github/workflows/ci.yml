name: CI

# Build and test on every push to main and on pull requests, so regressions are
# caught before a release is ever cut.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Toolchain info
        run: swift --version

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.swift') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Build
        run: swift build --build-tests

      - name: Test
        run: swift test --skip-build
